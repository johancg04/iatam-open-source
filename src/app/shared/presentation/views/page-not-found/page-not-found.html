<section class="page-not-found container-with-spacing" aria-labelledby="page-not-found-title">
  <h1 id="page-not-found-title">{{ 'page-not-found.title' | translate }}</h1>
  <div [innerHTML]="'page-not-found.content' | translate: { invalid_path: invalidPath }"></div>
  <button mat-raised-button color="primary"
          (click)="navigateToHome()"
          aria-label="Go to Home">
    {{ 'page-not-found.go-home' | translate }}
  </button>
</section>
